apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-service
  namespace: moneymitra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-service
  template:
    metadata:
      labels:
        app: portfolio-service
    spec:
      containers:
        - name: portfolio-service
          image: moneymitra-portfolio-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-service
  namespace: moneymitra
spec:
  selector:
    app: portfolio-service
  ports:
    - port: 8000
      targetPort: 8000
