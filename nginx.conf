server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests if needed, but since we use localhost:30001 from client-side
    # we don't necessarily need proxying here unless we want to unify the URL.
}
